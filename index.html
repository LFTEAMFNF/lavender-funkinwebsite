<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lavender Funkin | OFFICIAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --glitch-purple: #9d71e2;
            --dark-void: #020202;
        }

        body {
            background-color: var(--dark-void);
            color: #fff;
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0a2e 0%, var(--dark-void) 70%);
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--glitch-purple);
        }

        nav a { color: #777; text-decoration: none; margin: 0 15px; font-size: 1.4rem; text-transform: uppercase; }
        nav a:hover { color: var(--glitch-purple); }

        header { text-align: center; padding: 20px; }
        .logo { font-size: 5rem; text-transform: uppercase; line-height: 0.8; }
        .logo span { color: var(--glitch-purple); display: block; font-size: 3rem; }

        .content-wrapper {
            display: flex;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            margin: auto;
            flex-grow: 1;
        }

        .announcements-box {
            width: 280px;
            background: rgba(20, 20, 20, 0.6);
            border: 2px solid #1a1a1a;
            padding: 15px;
        }

        .announcements-box h2 { color: var(--glitch-purple); border-bottom: 1px solid #333; margin-top: 0; }
        
        .entry { display: flex; align-items: center; gap: 10px; margin-top: 15px; }

        .teaser-container { flex-grow: 1; text-align: center; }
        #display-box {
            width: 100%; aspect-ratio: 16 / 9; background: #000; border: 2px solid #1a1a1a;
            display: flex; justify-content: center; align-items: center; position: relative;
            overflow: hidden;
        }

        #display-box img, #display-box video { width: 100%; height: 100%; object-fit: contain; }

        .teaser-menu { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .teaser-btn { background: #111; border: 1px solid #333; color: #666; padding: 10px 20px; cursor: pointer; font-family: 'VT323'; font-size: 1.2rem; text-transform: uppercase; transition: 0.2s; }
        .teaser-btn:hover { border-color: var(--glitch-purple); color: #fff; }

        footer { display: flex; justify-content: space-between; padding: 15px 40px; background: #000; }
        .mute-btn { background: none; border: none; color: #555; font-family: 'VT323'; font-size: 1.2rem; cursor: pointer; }
        .mute-btn:hover { color: var(--glitch-purple); }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="spookie.mp3" type="audio/mpeg"></audio>

    <nav>
        <a href="#">Home</a>
        <a href="https://discord.gg/agZ7QE3B5d" target="_blank">Discord</a>
        <a href="https://www.youtube.com/@LavenderFunkinTeam" target="_blank">YouTube</a>
        <a href="https://x.com/LavFunkinTeam" target="_blank">Twitter</a>
    </nav>

    <header>
        <div class="logo">LAVENDER <span>FUNKIN</span></div>
    </header>

    <main class="content-wrapper">
        <aside class="announcements-box">
            <h2>Announcements</h2>
            <div class="entry">
                <span><b>Cold:</b> NEW WEBSITE FOR LF!!!!</span>
            </div>
        </aside>

        <section class="teaser-container">
            <div id="display-box">
                <p id="status-msg" style="color: #444;">[ CLICK TO LOAD SIGNAL ]</p>
            </div>
            <div class="teaser-menu">
                <button class="teaser-btn" onclick="playTeaser('image', 'monochrome lf mix teaser.png')">LOG_01</button>
                <button class="teaser-btn" onclick="playTeaser('image', 'guhhhhhhh.png')">LOG_02</button>
                <button class="teaser-btn" onclick="playTeaser('video', 'HATREDV2LEAK.mp4')">VID_01</button>
                <button class="teaser-btn" onclick="playTeaser('video', 'route12.mp4')">VID_02</button>
            </div>
        </section>
    </main>

    <footer>
        <button class="mute-btn" id="mute-toggle" onclick="toggleMute()">MUTE: OFF</button>
        <div style="color: #222;">&copy; 2026 LF TEAM</div>
    </footer>

    <script>
        const music = document.getElementById('bg-music');
        const box = document.getElementById('display-box');
        let isMuted = false;

        document.body.onclick = () => { if(!isMuted) music.play(); };

        function toggleMute() {
            isMuted = !isMuted;
            isMuted ? music.pause() : music.play();
            document.getElementById('mute-toggle').innerText = isMuted ? "MUTE: ON" : "MUTE: OFF";
        }

        function playTeaser(type, src) {
            box.innerHTML = '';
            if (type === 'image') {
                if(!isMuted) music.play();
                const img = new Image();
                img.src = src;
                img.onload = () => box.appendChild(img);
                img.onerror = () => box.innerHTML = `<p style="color:red; padding: 20px;">[ERR: ${src} NOT FOUND]</p>`;
            } else {
                music.pause();
                const vid = document.createElement('video');
                vid.src = src; vid.controls = true; vid.autoplay = true;
                vid.onended = () => { if(!isMuted) music.play(); };
                vid.onerror = () => { 
                    box.innerHTML = `<p style="color:red; padding: 20px;">[ERR: ${src} NOT FOUND]</p>`; 
                    if(!isMuted) music.play(); 
                };
                box.appendChild(vid);
            }
        }
    </script>
</body>
</html>
